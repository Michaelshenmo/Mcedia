# Build workflow for McediaCore
#
# Builds all modules across multiple Minecraft versions and native platforms.
# Uses a discovery job to normalize the version/platform set from gradle.properties
# or workflow_dispatch input, then fans out into parallel matrix jobs.
#
# Job structure:
#   discover → non-versioned (api, player, decoder-ffmpeg)
#           → cn-platforms   (matrix: mc_version)
#           → core           (matrix: mc_version × native_platform)
#
# Non-versioned modules are rebuilt as project dependencies by each versioned
# job via Gradle's project-dependency resolution — no cross-job artifact passing.
name: Build

on:
  push:
    branches: [master, dev]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      mc_versions:
        description: 'Minecraft versions (comma-separated, e.g. 1.21.11 or 1.21.11,26.1)'
        default: '1.21.11'
        required: true
        type: string
      build_platforms:
        description: 'Native platforms (comma-separated, or "all")'
        default: 'all'
        required: true
        type: string
      create_release:
        description: 'Create a GitHub Release with the built artifacts'
        default: false
        type: boolean

env:
  GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8'

jobs:
  # ── Discover ────────────────────────────────────────────────────────
  # Normalizes MC versions and native platforms into JSON arrays consumed
  # by downstream matrix jobs. For push/PR reads from gradle.properties;
  # for workflow_dispatch uses the user-supplied input.
  discover:
    runs-on: ubuntu-latest
    outputs:
      mc_versions: ${{ steps.set-mc.outputs.mc_versions }}
      platforms:   ${{ steps.set-platforms.outputs.platforms }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Minecraft versions
        id: set-mc
        run: |
          if [ '${{ github.event_name }}' = 'workflow_dispatch' ]; then
            INPUT='${{ github.event.inputs.mc_versions }}'
          else
            INPUT=$(grep '^supported_mc_versions' gradle.properties | cut -d= -f2-)
          fi
          JSON=$(echo "$INPUT" | tr ',' '\n' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | jq --raw-input --slurp --compact-output \
              'split("\n") | map(select(length > 0))')
          echo "mc_versions=$JSON" >> "$GITHUB_OUTPUT"
          echo "Resolved MC versions: $JSON"

      - name: Resolve native platforms
        id: set-platforms
        run: |
          if [ '${{ github.event_name }}' = 'workflow_dispatch' ] \
             && [ '${{ github.event.inputs.build_platforms }}' != 'all' ]; then
            INPUT='${{ github.event.inputs.build_platforms }}'
          else
            INPUT=$(grep '^supported_native_platforms' gradle.properties | cut -d= -f2-)
          fi
          JSON=$(echo "$INPUT" | tr ',' '\n' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | jq --raw-input --slurp --compact-output \
              'split("\n") | map(select(length > 0))')
          echo "platforms=$JSON" >> "$GITHUB_OUTPUT"
          echo "Resolved platforms: $JSON"

  # ── Non-versioned modules ──────────────────────────────────────────
  # Pure Java libraries with no Minecraft dependency.
  # Runs tests — they are standard JUnit 5 and don't need GL/OpenAL.
  non-versioned:
    needs: discover
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build non-versioned modules (with tests)
        run: |
          ./gradlew :mcedia-api:build \
                    :mcedia-player:build \
                    :mcedia-decoder-ffmpeg:build \
                    -Psupported_mc_versions=1.21.11

      - name: Upload non-versioned JARs
        uses: actions/upload-artifact@v4
        with:
          name: non-versioned-jars
          path: |
            mcedia-api/build/libs/*.jar
            mcedia-player/build/libs/*.jar
            mcedia-decoder-ffmpeg/build/libs/*.jar
          if-no-files-found: warn

  # ── Versioned: cn-platforms ─────────────────────────────────────────
  # Chinese platform integration mod. One build per MC version.
  # No native platform variants — does not bundle FFmpeg.
  # Runs tests (no GL/OpenAL dependency).
  cn-platforms:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mc_version: ${{ fromJSON(needs.discover.outputs.mc_versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Java version for ${{ matrix.mc_version }}
        id: jdk
        run: |
          PROP="mcedia-cn-platforms/versions/${{ matrix.mc_version }}/gradle.properties"
          echo "java_version=$(grep '^java_version' "$PROP" | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Set up JDK ${{ steps.jdk.outputs.java_version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.jdk.outputs.java_version }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build cn-platforms for ${{ matrix.mc_version }}
        run: |
          ./gradlew :mcedia-cn-platforms-${{ matrix.mc_version }}:buildAndCollect \
                    -Psupported_mc_versions=${{ matrix.mc_version }}

      - name: Upload cn-platforms JAR (${{ matrix.mc_version }})
        uses: actions/upload-artifact@v4
        with:
          name: mcedia-cn-platforms-${{ matrix.mc_version }}
          path: build/libs/${{ matrix.mc_version }}/*.jar
          if-no-files-found: warn

  # ── Versioned: core (matrix: mc_version × native_platform) ──────────
  # Core mod that bundles FFmpeg native binaries. Each platform variant
  # selects a different JavaCPP Maven artifact — no cross-compilation.
  # Tests are skipped: they depend on Minecraft's rendering/audio
  # infrastructure (GL context, OpenAL) not available on CI runners.
  core:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mc_version: ${{ fromJSON(needs.discover.outputs.mc_versions) }}
        platform:   ${{ fromJSON(needs.discover.outputs.platforms) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Java version for ${{ matrix.mc_version }}
        id: jdk
        run: |
          PROP="mcedia-core/versions/${{ matrix.mc_version }}/gradle.properties"
          echo "java_version=$(grep '^java_version' "$PROP" | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Set up JDK ${{ steps.jdk.outputs.java_version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.jdk.outputs.java_version }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build core ${{ matrix.mc_version }} for ${{ matrix.platform }}
        run: |
          ./gradlew :mcedia-core-${{ matrix.mc_version }}:buildAndCollect \
                    -Psupported_mc_versions=${{ matrix.mc_version }} \
                    -PplatformName=${{ matrix.platform }} \
                    -x test

      - name: Upload core JAR (${{ matrix.mc_version }} ${{ matrix.platform }})
        uses: actions/upload-artifact@v4
        with:
          name: mcedia-core-${{ matrix.mc_version }}-${{ matrix.platform }}
          path: build/libs/${{ matrix.mc_version }}/*.jar
          if-no-files-found: error

  # ── Release ──────────────────────────────────────────────────────────
  # Creates a GitHub Release with all built JARs as assets.
  # Triggered by:
  #   - Push of a tag matching v* (e.g. v1.0.0, v1.0.0-rc1)
  #   - workflow_dispatch with create_release=true
  release:
    if: |
      startsWith(github.ref, 'refs/tags/v')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    needs: [non-versioned, cn-platforms, core]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Gather JAR files
        run: |
          mkdir -p release-assets
          find artifacts -name '*.jar' -type f | while read jar; do
            echo "Collected: $jar"
            cp "$jar" release-assets/
          done
          echo "---"
          ls -lh release-assets/

      - name: Determine release tag and name
        id: tag
        run: |
          if [ '${{ github.event_name }}' = 'workflow_dispatch' ]; then
            # Use current version from gradle.properties
            VERSION=$(grep '^version=' gradle.properties | cut -d= -f2)
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "name=v${VERSION} (manual release)"
          else
            TAG=${GITHUB_REF_NAME}
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "name=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            Automated build from commit ${{ github.sha }}.

            ## Modules

            - **mcedia-api** — API interfaces
            - **mcedia-player** — Media player engine
            - **mcedia-decoder-ffmpeg** — FFmpeg decoder via JavaCV
            - **mcedia-core** (per-platform) — Core Fabric mod with FFmpeg native binaries
            - **mcedia-cn-platforms** — Chinese streaming platform integration

            ## Native Platforms (mcedia-core)

            - windows-x86_64
            - linux-x86_64
            - linux-arm64
            - macosx-x86_64
            - macosx-arm64
          files: release-assets/*.jar
          fail_on_unmatched_files: true

  # ── Publish to GitHub Packages ────────────────────────────────────────
  # Publishes all modules (non-versioned + versioned for all MC versions)
  # to GitHub Packages Maven registry. Only runs on tag pushes (v*).
  publish-to-github:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [non-versioned, cn-platforms, core]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve MC versions for publish
        id: mc
        run: |
          VERSIONS=$(grep '^supported_mc_versions' gradle.properties | cut -d= -f2- | tr ',' '\n' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | paste -sd ',' -)
          echo "versions=$VERSIONS" >> "$GITHUB_OUTPUT"
          echo "Resolved: $VERSIONS"

      - name: Publish to GitHub Packages
        run: |
          # Non-versioned modules
          ./gradlew :mcedia-api:publish \
                    :mcedia-player:publish \
                    :mcedia-decoder-ffmpeg:publish \
                    -Psupported_mc_versions=1.21.11 \
                    -Pgpr.user=tobyprime \
                    -Pgpr.key=${{ secrets.GITHUB_TOKEN }}

          # Versioned modules — one MC version at a time
          # mcedia-core is excluded: it builds per-native-platform and is
          # distributed via GitHub Releases (see the 'release' job above).
          for VER in $(echo "${{ steps.mc.outputs.versions }}" | tr ',' ' '); do
            ./gradlew :mcedia-cn-platforms-${VER}:publish \
                      -Psupported_mc_versions=${VER} \
                      -Pgpr.user=tobyprime \
                      -Pgpr.key=${{ secrets.GITHUB_TOKEN }}
          done